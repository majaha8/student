<div class="field">
    <div class="control has-icons-left">
        <input
            class="input is-rectangle has-background-light"
            type="text"
            name="search"
            placeholder="Search tasks..."
            hx-get="{{ url_for('main.search') }}"
            hx-trigger="keyup changed delay:300ms"
            hx-target="#task-results"
            hx-swap="innerHTML"
        />
        <span class="icon is-left has-text-grey">
            <i class="fas fa-search"></i>
        </span>
    </div>
</div>
